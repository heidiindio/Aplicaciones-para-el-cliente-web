<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Rosa</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .calculadora {
      background: #fff0f6;
      border-radius: 20px;
      padding: 40px;
      width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }
    .pantalla {
      background: #ffe4ec;
      color: #d6336c;
      font-size: 1.8em;
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      font-family: 'Courier New', monospace;
      box-shadow: inset 0 0 10px rgba(214,51,108,0.3);
    }
    input {
      width: 45%;
      padding: 12px;
      margin: 10px;
      border-radius: 12px;
      border: 2px solid #f783ac;
      font-size: 1em;
      background: #fff;
      color: #d6336c;
      text-align: center;
    }
    .botones {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      background: #f783ac;
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    button:hover {
      background: #d6336c;
    }
    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      background: #fff0f6;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #f783ac;
      color: #d6336c;
    }
    th {
      background: #f783ac;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="calculadora">
    <div class="pantalla" id="pantalla">Ingrese números...</div>
    <input type="number" id="num1" placeholder="Número 1">
    <input type="number" id="num2" placeholder="Número 2">

    <div class="botones">
      <button onclick="realizarOperaciones()">Calcular</button>
      <button onclick="limpiar()">Limpiar</button>
    </div>

    <table id="tablaResultados">
      <thead>
        <tr>
          <th>Iteración</th>
          <th>Operación</th>
          <th>Resultado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    function realizarOperaciones() {
      let a = parseFloat(document.getElementById("num1").value);
      let b = parseFloat(document.getElementById("num2").value);
      let pantalla = document.getElementById("pantalla");
      let tbody = document.querySelector("#tablaResultados tbody");
      tbody.innerHTML = "";

      if (isNaN(a) || isNaN(b)) {
        pantalla.textContent = "Error: ingrese números válidos";
        return;
      }

      let operaciones = [
        { nombre: "+ Suma", resultado: a + b },
        { nombre: "- Resta", resultado: a - b },
        { nombre: "* Multiplicación", resultado: a * b },
        { nombre: "/ División", resultado: b !== 0 ? (a / b) : "Error" },
        { nombre: "% Módulo", resultado: b !== 0 ? (a % b) : "Error" }
      ];

      pantalla.textContent = "Resultados calculados ";

      operaciones.forEach((op, i) => {
        let fila = `<tr>
                      <td>${i+1}</td>
                      <td>${op.nombre}</td>
                      <td>${op.resultado}</td>
                    </tr>`;
        tbody.innerHTML += fila;
      });
    }

    function limpiar() {
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "";
      document.getElementById("pantalla").textContent = "Ingrese números...";
      document.querySelector("#tablaResultados tbody").innerHTML = "";
    }
  </script>
</body>
</html>
